<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Real - Princesinha Sofia</title>
    <!-- Fontes mágicas e delicadas do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Sofia&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Fundo em degradê lilás pastel bem delicado */
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%);
            color: #3b0764;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Quicksand', sans-serif;
        }

        .invite-container {
            /* Fundo do convite em Roxo Real com bordas douradas */
            background: linear-gradient(135deg, #6b21a8 0%, #4c1d95 100%);
            color: #fdf4ff;
            max-width: 450px;
            width: 100%;
            border-radius: 30px;
            padding: 45px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(107, 33, 168, 0.3);
            border: 3px solid #f59e0b; /* Borda Dourada */
            position: relative;
        }

        /* CAMADA DA IMAGEM DE FUNDO SEMI-TRANSPARENTE DA PRINCESINHA SOFIA */
        .invite-container::after {
            content: "";
            background-image: url('https://www.imagenspng.com.br/wp-content/uploads/2018/11/princesa-sofia-05.png');
            background-size: 85%; /* Controla o tamanho da imagem no fundo */
            background-repeat: no-repeat;
            background-position: center 30%; /* Centralizada horizontalmente */
            opacity: 0.12; /* Controle da transparência (0.12 = 12% de opacidade) */
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none; /* Não atrapalha os cliques nos botões */
            border-radius: 27px; /* Acompanha o arredondado do convite */
        }

        /* Mantém os elementos visíveis acima da imagem de fundo */
        .badge, h1, .subtitle, .info-block, .rsvp-section {
            position: relative;
            z-index: 1;
        }

        /* Detalhe que lembra uma coroa/realeza no topo */
        .invite-container::before {
            content: "👑";
            font-size: 2rem;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #f3e8ff;
            padding: 0 10px;
            z-index: 2;
        }

        .badge {
            background: #fef08a; /* Amarelo ouro claro */
            color: #713f12;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid #eab308;
        }

        h1 {
            /* AJUSTADO: Nome correto da fonte carregada do Google (Sofia) */
            font-family: 'Sofia', cursive;
            font-size: 3.2rem;
            line-height: 1.2;
            margin-bottom: 15px;
            /* Degradê dourado brilhante no texto */
            background: linear-gradient(to right, #ffe4e6, #fef08a, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            color: #e9d5ff;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 35px;
        }

        .info-block {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(2px); /* Efeito enevoado para melhorar a leitura sobre a imagem */
        }

        .info-title {
            color: #fef08a; /* Dourado para os títulos secundários */
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
        }

        .btn {
            display: block;
            background: linear-gradient(to right, #f59e0b, #d97706); /* Botão Dourado Realeza */
            color: #3b0764;
            text-decoration: none;
            padding: 16px;
            border-radius: 15px;
            font-weight: 700;
            margin-top: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .rsvp-section {
            margin-top: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 30px;
        }

        .rsvp-section h3 {
            margin-bottom: 20px;
            font-size: 1.4rem;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            color: #fef08a;
        }

        iframe {
            width: 100%;
            border: none;
            border-radius: 15px;
            height: 310px;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="invite-container">
        <span class="badge">Convite Real</span>
        
        <!-- Suas informações salvas com sucesso -->
        <h1>Luara Shopia - 1 Ano</h1>
        <p class="subtitle">Sua presença tornará o nosso reino ainda mais alegre e mágico!</p>

        <div class="info-block">
            <div class="info-title">📅 Quando será o Baile?</div>
            <div class="info-value">Sábado, 29 de Agosto às 17:00h</div>
        </div>

        <div class="info-block">
            <div class="info-title">📍 Castelo do Evento</div>
            <div class="info-value">Sede dos Idosos</div>
            <p style="color: #cbd5e1; font-size: 0.9rem; margin-top: 5px;">R. da Vaidade, 120, Salinas da Margarida</p>
            
            <a href="https://maps.app.goo.gl/" target="_blank" class="btn">Abrir Mapa Real</a>
        </div>

        <!-- Seção de Confirmação (RSVP) ajustada para exibição ideal -->
        <div class="rsvp-section">
            <h3>Confirme sua Presença</h3>
            
            <iframe src="https://tally.so/embed/XxyD0O?hideTitle=1&transparentBackground=1" title="RSVP"></iframe>
        </div>
    </div>

</body>
</html>
